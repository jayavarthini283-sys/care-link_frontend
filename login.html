<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CareLink - Sign In</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/login.css">
</head>
<body class="auth-body">

    <div class="auth-card">
        <div class="auth-header">
            <div class="logo-icon">
                <i class="bi bi-activity"></i>
            </div>
            <h3>CareLink Portal</h3>
            <p>Healthcare Management System</p>
        </div>
        <div class="auth-body-content">
            <div id="alert-container"></div>
            
            <form id="loginForm" novalidate>
                <div class="form-floating mb-3">
                    <input type="email" class="form-control" id="email" placeholder="name@example.com" required>
                    <label for="email"><i class="bi bi-envelope me-2"></i>Email address</label>
                    <div class="invalid-feedback">Please enter a valid email address.</div>
                </div>
                
                <div class="form-floating mb-4">
                    <input type="password" class="form-control" id="password" placeholder="Password" required>
                    <label for="password"><i class="bi bi-lock me-2"></i>Password</label>
                    <div class="invalid-feedback">Please enter your password.</div>
                </div>
                
                <button type="submit" class="btn btn-auth w-100" id="loginBtn">
                    <span class="spinner-border spinner-border-sm d-none me-2" role="status" aria-hidden="true" id="loginSpinner"></span>
                    <i class="bi bi-box-arrow-in-right me-2" id="loginIcon"></i>Sign In
                </button>
            </form>
        </div>
        <div class="auth-footer text-muted">
            Don't have a patient account? <a href="register.html">Sign Up Here</a>
        </div>
    </div>

    <!-- Bootstrap 5 JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Core JS APIs -->
    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    
    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const form = e.target;
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const alertContainer = document.getElementById('alert-container');
            const loginBtn = document.getElementById('loginBtn');
            const loginSpinner = document.getElementById('loginSpinner');
            const loginIcon = document.getElementById('loginIcon');
            
            alertContainer.innerHTML = '';
            
            if (!form.checkValidity()) {
                form.classList.add('was-validated');
                return;
            }
            
            // UI Loading state
            loginBtn.disabled = true;
            loginSpinner.classList.remove('d-none');
            loginIcon.classList.add('d-none');
            
            try {
                await login(email, password);
                
                // Show success
                alertContainer.innerHTML = `
                    <div class="alert alert-success alert-custom d-flex align-items-center" role="alert">
                        <i class="bi bi-check-circle-fill me-2 fs-5"></i>
                        <div>Login successful! Redirecting...</div>
                    </div>
                `;
                
                setTimeout(() => {
                    window.location.href = 'index.html';
                }, 1000);
            } catch (err) {
                console.error(err);
                alertContainer.innerHTML = `
                    <div class="alert alert-danger alert-custom d-flex align-items-center" role="alert">
                        <i class="bi bi-exclamation-triangle-fill me-2 fs-5"></i>
                        <div>${err.message || 'Login failed. Please verify credentials.'}</div>
                    </div>
                `;
                
                // Reset button state
                loginBtn.disabled = false;
                loginSpinner.classList.add('d-none');
                loginIcon.classList.remove('d-none');
            }
        });
    </script>
</body>
</html>
