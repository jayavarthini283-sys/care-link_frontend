<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CareLink Admin - Manage Patients</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <div class="wrapper">
        <!-- Sidebar container -->
        <div id="sidebar-container"></div>

        <!-- Content Area -->
        <div id="content">
            <!-- Navbar container -->
            <div id="navbar-container"></div>

            <div class="d-flex justify-content-between align-items-center mb-4">
                <div>
                    <h2 class="fw-bold text-dark mb-1">Manage Patients</h2>
                    <p class="text-muted mb-0">Clinic administrative portal to review and remove registered patient accounts.</p>
                </div>
            </div>

            <div id="alert-container"></div>

            <!-- Loading Spinner -->
            <div id="patients-spinner" class="spinner-container">
                <div class="spinner-border text-primary" role="status">
                    <span class="visually-hidden">Loading patients...</span>
                </div>
            </div>

            <!-- Empty State -->
            <div id="no-patients" class="text-center py-5 d-none card card-custom p-5">
                <i class="bi bi-people-fill text-muted display-4 mb-3"></i>
                <h5 class="fw-bold text-dark">No Patients Found</h5>
                <p class="text-muted mb-0">There are no patient records currently in the database system.</p>
            </div>

            <!-- Patients Table -->
            <div class="card card-custom table-card shadow-sm d-none" id="table-card">
                <div class="card-header bg-white py-3">
                    <h5 class="mb-0 fw-bold text-dark"><i class="bi bi-people-fill me-2 text-primary"></i>Patient Directory Log</h5>
                </div>
                <div class="table-responsive">
                    <table class="table table-custom mb-0 text-nowrap">
                        <thead>
                            <tr>
                                <th>Patient ID</th>
                                <th>Full Name</th>
                                <th>Email</th>
                                <th>Blood Group</th>
                                <th>Emergency Contact</th>
                                <th class="text-center">Action Checklist</th>
                            </tr>
                        </thead>
                        <tbody id="patients-tbody">
                            <!-- Populated dynamically -->
                        </tbody>
                    </table>
                </div>
            </div>

        </div>
    </div>

    <!-- Bootstrap 5 JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Core JS APIs -->
    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            protectPage(['CLINIC_ADMIN']);
            
            const spinner = document.getElementById('patients-spinner');
            const noPatients = document.getElementById('no-patients');
            const tableCard = document.getElementById('table-card');
            const tbody = document.getElementById('patients-tbody');
            const alertContainer = document.getElementById('alert-container');
            
            await loadPatientsList();
            
            async function loadPatientsList() {
                spinner.classList.remove('d-none');
                tableCard.classList.add('d-none');
                noPatients.classList.add('d-none');
                tbody.innerHTML = '';
                
                try {
                    const patients = await apiFetch('/api/patients');
                    spinner.classList.add('d-none');
                    
                    if (patients.length === 0) {
                        noPatients.classList.remove('d-none');
                        return;
                    }
                    
                    tableCard.classList.remove('d-none');
                    
                    patients.forEach(pat => {
                        const tr = document.createElement('tr');
                        const email = pat.account ? pat.account.email : 'Patient';
                        
                        tr.innerHTML = `
                            <td class="fw-bold">#${pat.id}</td>
                            <td class="fw-semibold text-dark">${pat.fullName || 'N/A'}</td>
                            <td>${email}</td>
                            <td>
                                <span class="badge bg-danger-light text-danger rounded-pill px-2.5 py-1.5 text-xs fw-bold">
                                    <i class="bi bi-droplet-fill me-1"></i>${pat.bloodGroup || 'N/A'}
                                </span>
                            </td>
                            <td>${pat.emergencyContact || 'N/A'}</td>
                            <td class="text-center">
                                <button class="btn btn-outline-danger btn-sm rounded-pill px-3" onclick="deletePatient(${pat.id}, '${escapeHtml(pat.fullName)}')">
                                    <i class="bi bi-trash3 me-1"></i> Delete Profile
                                </button>
                            </td>
                        `;
                        tbody.appendChild(tr);
                    });
                } catch (e) {
                    console.error(e);
                    spinner.classList.add('d-none');
                    showGlobalAlert('danger', 'Failed to retrieve patient registry from the server.');
                }
            }
            
            window.deletePatient = async (id, name) => {
                if (!confirm(`Are you sure you want to permanently delete patient profile for "${name}"? This deletes the credentials account and all historical records.`)) {
                    return;
                }
                
                try {
                    await apiFetch(`/api/patients/${id}`, {
                        method: 'DELETE'
                    });
                    
                    showGlobalAlert('success', `Patient "${name}" deleted successfully.`);
                    await loadPatientsList();
                } catch (e) {
                    console.error(e);
                    showGlobalAlert('danger', e.message || `Failed to delete profile for ${name}.`);
                }
            };
            
            function showGlobalAlert(type, message) {
                alertContainer.innerHTML = `
                    <div class="alert alert-${type} alert-custom alert-dismissible fade show d-flex align-items-center mb-4" role="alert">
                        <i class="bi bi-${type === 'success' ? 'check-circle-fill' : 'exclamation-triangle-fill'} me-2 fs-5"></i>
                        <div>${message}</div>
                        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                    </div>
                `;
            }
            
            function escapeHtml(text) {
                if (!text) return '';
                return text
                    .replace(/&/g, "&amp;")
                    .replace(/</g, "&lt;")
                    .replace(/>/g, "&gt;")
                    .replace(/"/g, "&quot;")
                    .replace(/'/g, "&#039;");
            }
        });
    </script>
</body>
</html>
