<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CareLink - Find Doctors</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <div class="wrapper">
        <!-- Sidebar container -->
        <div id="sidebar-container"></div>

        <!-- Content Area -->
        <div id="content">
            <!-- Navbar container -->
            <div id="navbar-container"></div>

            <div class="d-flex justify-content-between align-items-center mb-4">
                <div>
                    <h2 class="fw-bold text-dark mb-1">Find Doctors</h2>
                    <p class="text-muted mb-0">Browse specialized medical practitioners and book consultations.</p>
                </div>
            </div>

            <!-- Filter Panel -->
            <div class="card card-custom p-4 mb-4">
                <div class="row g-3">
                    <div class="col-md-6">
                        <div class="input-group">
                            <span class="input-group-text bg-white border-end-0"><i class="bi bi-search text-muted"></i></span>
                            <input type="text" class="form-control border-start-0" id="search-input" placeholder="Search by doctor email or specialization...">
                        </div>
                    </div>
                    <div class="col-md-6">
                        <select class="form-select" id="specialization-filter">
                            <option value="">All Specializations</option>
                            <!-- Populated dynamically -->
                        </select>
                    </div>
                </div>
            </div>

            <!-- Loading Spinner -->
            <div id="doctors-spinner" class="spinner-container">
                <div class="spinner-border text-primary" role="status">
                    <span class="visually-hidden">Loading...</span>
                </div>
            </div>

            <!-- Empty State -->
            <div id="no-doctors" class="text-center py-5 d-none">
                <i class="bi bi-person-x text-muted display-4 mb-3"></i>
                <p class="text-muted">No doctors found matching your search criteria.</p>
            </div>

            <!-- Grid container for doctors cards -->
            <div class="row row-cols-1 row-cols-md-2 row-cols-lg-3 g-4" id="doctors-grid">
                <!-- Dynamically populated -->
            </div>

        </div>
    </div>

    <!-- Bootstrap 5 JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Core JS APIs -->
    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <!-- Page JS -->
    <script src="js/doctor.js"></script>
</body>
</html>
